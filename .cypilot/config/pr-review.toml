# PR Review Configuration
# Generated by cypilot sdlc kit — edit to match your project.
#
# Resolution order:
#   1. {cypilot_path}/config/pr-review.toml   (user-editable, this file)
#   2. {cypilot_path}/.gen/kits/sdlc/scripts/pr-review.toml  (default)
#
# Paths support {cypilot_path} variable — resolved at runtime.

data_dir = ".prs"

# ── Prompt entries ────────────────────────────────────────────────
# Each [[prompts]] block maps a review type to a prompt file,
# checklist, and optional project-specific variables.
# The agent selects the best match based on PR content.

[[prompts]]
description = "Code Review"
prompt_file = "{cypilot_path}/config/kits/sdlc/scripts/prompts/pr/code-review.md"
checklist   = "{cypilot_path}/.gen/kits/sdlc/codebase/checklist.md"
spec_coverage_checklist = "{cypilot_path}/config/kits/sdlc/codebase/spec-coverage-checklist.md"
min_coverage    = "100"
min_granularity = "0.5"
# coding_guidelines = "docs/coding-guidelines.md"
# security_guidelines = "docs/security-guidelines.md"

[[prompts]]
description = "PRD Review"
prompt_file = "{cypilot_path}/.gen/kits/sdlc/scripts/prompts/pr/prd-review.md"
checklist   = "{cypilot_path}/.gen/kits/sdlc/artifacts/PRD/checklist.md"
template    = "{cypilot_path}/.gen/kits/sdlc/artifacts/PRD/template.md"
